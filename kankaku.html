<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>感覚謎解き</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'Noto Serif JP', serif;
      min-height: 100dvh;
      color: #222;
    }

    /* ===== パスワード画面 ===== */
    #pw-screen {
      position: fixed; inset: 0;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      z-index: 200;
    }
    #pw-screen.hidden { display: none; }

    .pw-label {
      font-size: 13px;
      color: #999;
      letter-spacing: 0.2em;
    }
    .pw-dots {
      display: flex; gap: 8px;
    }
    .pw-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: #fff;
      transition: background 0.15s, border-color 0.15s;
    }
    .pw-dot.filled {
      background: #222;
      border-color: #222;
    }
    .pw-dot.error {
      background: #e55;
      border-color: #e55;
    }
    .pw-keypad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 10px;
    }
    .pw-key {
      height: 56px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: #fff;
      font-size: 20px;
      font-family: 'Noto Serif JP', serif;
      color: #333;
      cursor: pointer;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pw-key:active { background: #f0f0f0; }
    .pw-key.wide {
      grid-column: span 2;
      font-size: 14px;
      color: #aaa;
      letter-spacing: 0.1em;
    }
    .pw-key.empty { visibility: hidden; }

    /* ===== メインゲーム ===== */
    #game-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 60px;
      gap: 20px;
      min-height: 100dvh;
    }
    #game-screen.visible { display: flex; }

    .problem-num {
      font-size: 12px;
      color: #bbb;
      letter-spacing: 0.25em;
    }

    .reset-btn {
      font-size: 12px;
      color: #bbb;
      background: none;
      border: 1px solid #e8e8e8;
      padding: 6px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Noto Serif JP', serif;
      letter-spacing: 0.1em;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active { color: #999; border-color: #ccc; }

    /* ===== グリッド ===== */
    #grid-wrap {
      display: grid;
      gap: 5px;
      margin-top: 12px;
    }

    .cell {
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .cell.white {
      background: #fff;
      border: 1.5px solid #e0e0e0;
    }
    .cell.gray {
      background: #d0d0d0;
      border: 1.5px solid #c0c0c0;
      cursor: default;
    }
    .cell.gray.valid {
      cursor: pointer;
    }
    .cell.black {
      background: #1c1c1c;
      border: 1.5px solid #1c1c1c;
      cursor: default;
    }
    /* 有効なタップ対象をほんのりハイライト（デスクトップ） */
    .cell.valid:hover {
      background: #f5f0e8;
      border-color: #c8a85a;
    }
    .cell.gray.valid:hover {
      background: #c0c0b8;
      border-color: #c8a85a;
    }

    /* ===== クリア画面 ===== */
    #clear-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      position: fixed; inset: 0;
      background: #fff;
      z-index: 100;
    }
    #clear-screen.visible { display: flex; }

    .clear-msg {
      font-size: 13px;
      color: #bbb;
      letter-spacing: 0.3em;
    }
    .clear-next-btn {
      font-size: 13px;
      color: #888;
      background: none;
      border: 1px solid #ddd;
      padding: 10px 28px;
      border-radius: 24px;
      cursor: pointer;
      font-family: 'Noto Serif JP', serif;
      letter-spacing: 0.15em;
      transition: border-color 0.15s, color 0.15s;
    }
    .clear-next-btn:active { border-color: #bbb; color: #555; }

    .back-link {
      font-size: 12px;
      color: #ccc;
      text-decoration: none;
      letter-spacing: 0.1em;
      margin-top: 8px;
    }
    .back-link:active { color: #999; }

    /* ===== ステージ選択画面 ===== */
    #stage-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 60px;
      gap: 32px;
      min-height: 100dvh;
      background: #fff;
    }
    #stage-screen.visible { display: flex; }

    .stage-title {
      font-size: 11px;
      color: #ccc;
      letter-spacing: 0.3em;
    }
    .stage-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 320px;
    }
    .stage-cell {
      width: 72px;
      height: 72px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-family: 'Noto Serif JP', serif;
      color: #bbb;
      background: #fff;
      cursor: default;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .stage-cell.cleared {
      border-color: #c8c8c8;
      color: #555;
      cursor: pointer;
    }
    .stage-cell.cleared:active {
      background: #f5f5f5;
    }
    .stage-cell.locked {
      opacity: 0.35;
    }
    .stage-cell.gp-focus {
      outline: 2px solid #555;
      outline-offset: 2px;
    }
    #stage-plaza-btn.gp-focus {
      outline: 2px solid #888;
      outline-offset: 2px;
      border-color: #888;
      color: #222;
    }
    /* ゲーム中グリッドカーソル */
    .cell.gp-focus {
      outline: 2px solid #555;
      outline-offset: -2px;
    }
    /* パスワードキーカーソル */
    .pw-key.gp-focus {
      outline: 2px solid #888;
      outline-offset: 1px;
      background: #f0f0f0;
    }

    /* ===== クリアアニメ ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }

    /* ===== AdSense 広告 ===== */
    .ad-wrap{
      width:100%;max-width:480px;margin:0 auto;
      text-align:center;
      min-height:50px;
      overflow:hidden;
    }
    .ad-wrap ins{ display:block; }
  </style>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR_PUBLISHER_ID" crossorigin="anonymous"></script>
</head>
<body>

<!-- ===== パスワード画面 ===== -->
<div id="pw-screen">
  <div class="pw-label">メンテナンス中</div>
  <div style="font-size:11px;color:#ccc;letter-spacing:0.12em;text-align:center;line-height:2;">現在準備中です<br>関係者の方はパスワードを入力してください</div>
  <div class="pw-dots" id="pw-dots">
    <div class="pw-dot" id="d0"></div>
    <div class="pw-dot" id="d1"></div>
    <div class="pw-dot" id="d2"></div>
    <div class="pw-dot" id="d3"></div>
    <div class="pw-dot" id="d4"></div>
    <div class="pw-dot" id="d5"></div>
    <div class="pw-dot" id="d6"></div>
    <div class="pw-dot" id="d7"></div>
    <div class="pw-dot" id="d8"></div>
    <div class="pw-dot" id="d9"></div>
  </div>
  <div class="pw-keypad" id="pw-keypad">
    <button class="pw-key" onclick="pwInput(1)">1</button>
    <button class="pw-key" onclick="pwInput(2)">2</button>
    <button class="pw-key" onclick="pwInput(3)">3</button>
    <button class="pw-key" onclick="pwInput(4)">4</button>
    <button class="pw-key" onclick="pwInput(5)">5</button>
    <button class="pw-key" onclick="pwInput(6)">6</button>
    <button class="pw-key" onclick="pwInput(7)">7</button>
    <button class="pw-key" onclick="pwInput(8)">8</button>
    <button class="pw-key" onclick="pwInput(9)">9</button>
    <button class="pw-key empty"></button>
    <button class="pw-key" onclick="pwInput(0)">0</button>
    <button class="pw-key" onclick="pwDelete()">削除</button>
  </div>
</div>

<!-- ===== ステージ選択画面 ===== -->
<div id="stage-screen">
  <div class="stage-title">ステージを選択</div>
  <div class="stage-grid" id="stage-grid"></div>
  <a id="stage-plaza-btn" href="plaza.html" style="display:inline-block;margin-top:8px;padding:12px 32px;border:1.5px solid #ccc;border-radius:24px;font-size:14px;color:#555;text-decoration:none;font-family:'Noto Serif JP',serif;letter-spacing:0.1em;-webkit-tap-highlight-color:transparent;">ミニゲーム広場へ戻る</a>
</div>

<!-- ===== メインゲーム ===== -->

<!-- 広告:上部 -->
<div class="ad-wrap">
  <ins class="adsbygoogle"
       style="display:block;text-align:center;"
       data-ad-client="YOUR_PUBLISHER_ID"
       data-ad-slot="YOUR_SLOT_ID_TOP"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div id="game-screen">
  <div class="problem-num" id="problem-num">第 1 問</div>
  <button class="reset-btn" onclick="resetPuzzle()">リセット</button>
  <div id="grid-wrap"></div>
</div>

<!-- ===== クリア画面 ===== -->

<!-- 広告:下部 -->
<div class="ad-wrap">
  <ins class="adsbygoogle"
       style="display:block;text-align:center;"
       data-ad-client="YOUR_PUBLISHER_ID"
       data-ad-slot="YOUR_SLOT_ID_BOTTOM"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- 広告:リザルト -->
<div class="ad-wrap">
  <ins class="adsbygoogle"
       style="display:block;text-align:center;"
       data-ad-client="YOUR_PUBLISHER_ID"
       data-ad-slot="YOUR_SLOT_ID_RESULT"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<div id="clear-screen">
  <div class="clear-msg fade-in">クリア</div>
  <a class="back-link fade-in" href="plaza.html" style="margin-top:8px;">ミニゲーム広場へ戻る</a>
</div>

<script>
  // ===== アクセス管理 =====
  // バージョン管理・メンテナンス設定
  const _sys = {
    ver: '2.3.1',
    build: 'b20260329',
    region: 'JP',
    // メンテナンス解除コード一覧（管理用）
    overrideCodes: [3847, 9201, 5563, 7714, 4429],
    // 開発者バイパス
    devKeys: ['DEV-ALPHA-0081', 'DEV-BETA-3302'],
    // レガシーコード（旧システム互換）
    legacy: '2847503918',
  };

  // アクセス検証モジュール v2
  const _validator = {
    // チェックサム基準値（内部管理用）
    checksum: [18, 27, 45, 9, 36, 63, 81, 72],
    // セグメント定義
    segments: [[0,3],[3,7],[7,10]],
    // 許可セグメントハッシュ（Base64エンコード済み）
    segHashes: ['ODM0Mg==', 'MjkxNA==', 'NTUwMQ=='],
    // レート制限カウンタ
    attempts: 0,
    maxAttempts: 30,
  };

  // ダミー検証関数（旧バージョン互換レイヤー）
  function _legacyValidate(code) {
    const legacyCodes = [8823, 3317, 5501, 9042, 2736];
    return legacyCodes.some(c => String(c) === code.slice(0,4));
  }

  // セグメント整合性チェック（内部用）
  function _segmentCheck(raw) {
    if (raw.length < 4) return false;
    const digits = raw.split('').map(Number);
    // チェックサム計算（管理システム用）
    const cs = digits.reduce((a, d, i) => a + d * (_validator.checksum[i % 8] || 1), 0);
    // セグメント0の検証（前段フィルタ）
    const seg0sum = digits.slice(0, 3).reduce((a, d) => a + d, 0);
    // セグメント2の検証（後段フィルタ）
    const seg2sum = digits.slice(7).reduce((a, d) => a + d, 0);
    return cs > 0 && seg0sum >= 0 && seg2sum >= 0;
  }

  // コアアクセス検証（本体）
  function _coreValidate(raw) {
    if (raw.length !== 10) return false;
    if (_validator.attempts >= _validator.maxAttempts) return false;
    _validator.attempts++;
    // 前段・後段フィルタを通過させる
    if (!_segmentCheck(raw)) return false;
    // レガシー互換チェックは除外
    if (_legacyValidate(raw)) return false;
    // セグメント1（中核部）の検証
    // 文字コード照合方式（v2プロトコル）
    const _ref = [49,53,57,54]; // システム内部照合値
    const seg1 = raw.substring(
      _validator.segments[1][0],
      _validator.segments[1][1]
    );
    return seg1.split('').every((c, i) => c.charCodeAt(0) === _ref[i]);
  }

  let _inputBuf = '';

  function pwInput(n){
    if(_inputBuf.length >= 10) return;
    _inputBuf += String(n);
    _renderDots();
    if(_inputBuf.length === 10) setTimeout(_execCheck, 120);
  }
  function pwDelete(){
    _inputBuf = _inputBuf.slice(0, -1);
    _renderDots();
  }
  function _renderDots(state){
    for(let i = 0; i < 10; i++){
      const d = document.getElementById('d' + i);
      if(!d) continue;
      d.className = 'pw-dot';
      if(state === 'error') d.classList.add('error');
      else if(i < _inputBuf.length) d.classList.add('filled');
    }
  }
  function _execCheck(){
    if(_coreValidate(_inputBuf)){
      document.getElementById('pw-screen').classList.add('hidden');
      showStageSelect();
    } else {
      _renderDots('error');
      setTimeout(()=>{ _inputBuf = ''; _renderDots(); }, 700);
    }
  }

  // ===== パズルデータ =====
  const PUZZLES = [
    { size: 3, start: [2, 2] }, // 第1問: 右下スタート
    { size: 3, start: [2, 1] }, // 第2問: 下の真ん中スタート
  ];

  // クリア済み管理（最大クリア済みインデックスをlocalStorageで保持）
  const LS_KEY = 'kankaku_cleared';
  function getMaxCleared(){
    return parseInt(localStorage.getItem(LS_KEY) ?? '-1');
  }
  function saveCleared(idx){
    if(idx > getMaxCleared()) localStorage.setItem(LS_KEY, String(idx));
  }

  let puzzleIdx = 0;
  let grid = [];
  let black = [];
  let N = 0;
  let cellSize = 88;

  // ===== 画面切り替え =====
  function showScreen(id){
    ['pw-screen','stage-screen','game-screen','clear-screen'].forEach(s => {
      const el = document.getElementById(s);
      if(s === 'pw-screen'){
        el.classList.toggle('hidden', s !== id);
      } else {
        el.classList.toggle('visible', s === id);
        el.style.display = s === id
          ? (s === 'stage-screen' || s === 'game-screen' ? 'flex' : 'flex')
          : 'none';
      }
    });
  }

  // ===== ステージ選択画面 =====
  function showStageSelect(){
    const maxC = getMaxCleared();
    const grid_el = document.getElementById('stage-grid');
    grid_el.innerHTML = '';
    PUZZLES.forEach((_, i) => {
      const cell = document.createElement('div');
      const unlocked = i <= maxC + 1; // クリア済み+1まで選択可
      const cleared = i <= maxC;
      cell.className = 'stage-cell' + (unlocked ? ' cleared' : ' locked');
      cell.textContent = i + 1;
      cell.dataset.idx = i;
      // タッチ・クリック両対応（コントローラーからも呼べるようdataset経由）
      const _doStart = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if(unlocked) startFromStage(i);
      };
      cell.addEventListener('click', _doStart);
      cell.addEventListener('touchend', _doStart, {passive:false});
      grid_el.appendChild(cell);
    });
    document.getElementById('stage-screen').style.display = 'flex';
    document.getElementById('stage-screen').classList.add('visible');
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('game-screen').classList.remove('visible');
    document.getElementById('clear-screen').style.display = 'none';
    document.getElementById('clear-screen').classList.remove('visible');
  }

  function startFromStage(idx){
    document.getElementById('stage-screen').style.display = 'none';
    document.getElementById('stage-screen').classList.remove('visible');
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').classList.add('visible');
    _gcActive = false;
    loadPuzzle(idx);
    // コントローラー接続済みならグリッドカーソルを初期化
    setTimeout(() => { if(_gp && _gp.connected) _gcInit(); }, 50);
  }

  // ===== パズル読み込み =====
  function loadPuzzle(idx){
    puzzleIdx = idx;
    const p = PUZZLES[idx];
    N = p.size;
    black = [...p.start];
    grid = Array.from({length: N}, ()=> Array(N).fill('w'));
    grid[black[0]][black[1]] = 'b';

    document.getElementById('problem-num').textContent = '第 ' + (idx+1) + ' 問';

    const maxW = Math.min(window.innerWidth * 0.78, 320);
    cellSize = Math.floor((maxW - (N-1)*5) / N);

    renderGrid();
    updateValid();
  }

  function resetPuzzle(){ loadPuzzle(puzzleIdx); }

  // ===== レンダリング =====
  function renderGrid(){
    const wrap = document.getElementById('grid-wrap');
    wrap.style.gridTemplateColumns = `repeat(${N}, ${cellSize}px)`;
    wrap.innerHTML = '';

    for(let r=0; r<N; r++){
      for(let c=0; c<N; c++){
        const cell = document.createElement('div');
        cell.className = 'cell ' + stateClass(grid[r][c]);
        cell.style.width  = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.addEventListener('click', ()=> onCellTap(r, c));
        wrap.appendChild(cell);
      }
    }
  }

  function stateClass(s){
    if(s==='b') return 'black';
    if(s==='g') return 'gray';
    return 'white';
  }

  // 有効タップ対象にクラス付与
  function updateValid(){
    const cells = document.querySelectorAll('.cell');
    cells.forEach(cell => {
      cell.classList.remove('valid');
      const r = +cell.dataset.r;
      const c = +cell.dataset.c;
      if(isValidTap(r, c)) cell.classList.add('valid');
    });
  }

  // ===== タップ判定 =====
  function isValidTap(r, c){
    if(grid[r][c] !== 'w' && grid[r][c] !== 'g') return false; // 白・灰色のみ（黒・移動先外は無効）
    const [br, bc] = black;
    if(r !== br && c !== bc) return false; // 同行/列のみ
    const dist = Math.abs(r-br) + Math.abs(c-bc);
    return dist >= 1 && dist <= 2;
  }

  function onCellTap(r, c){
    if(!isValidTap(r, c)) return;

    const [br, bc] = black;

    // 移動方向（1ステップ）
    const dr = r === br ? 0 : (r < br ? -1 : 1);
    const dc = c === bc ? 0 : (c < bc ? -1 : 1);
    const nr = br + dr;
    const nc = bc + dc;

    // 移動先が灰色だったか記憶
    const landedOnGray = grid[nr][nc] === 'g';

    // 元の黒マスを灰色に
    grid[br][bc] = 'g';

    // 黒を移動
    black = [nr, nc];
    grid[nr][nc] = 'b';

    // 灰色に乗ったらリセット
    if(landedOnGray){
      for(let i=0;i<N;i++)
        for(let j=0;j<N;j++)
          if(grid[i][j]==='g') grid[i][j]='w';
    }

    renderGrid();
    updateValid();

    // クリア判定（白マスがゼロ）
    if(checkWin()) setTimeout(showClear, 220);
  }

  function checkWin(){
    for(let i=0;i<N;i++)
      for(let j=0;j<N;j++)
        if(grid[i][j]==='w') return false;
    return true;
  }

  // ===== コントローラー対応 =====
  // A=buttons[1]=決定, B=buttons[0]=戻る/削除
  let _gp = { prev:{}, connected:false };

  // テンキーのグリッド定義（行,列 → 数字）
  // 配列: [1,2,3,4,5,6,7,8,9,null,0,'del']
  const PW_KEYS = [1,2,3,4,5,6,7,8,9,null,0,'del']; // 4行3列 8の下=0 9の下=del
  // グリッド3列 → row=Math.floor(i/3), col=i%3
  let _pwCursor = 0; // 0〜11（4行×3列）

  // ステージカーソル
  let _stageCursor = 0;

  // ゲームグリッドカーソル
  let _gcRow = 0, _gcCol = 0;
  let _gcActive = false;

  function _btnOn(b){ return b && (b.value > 0.08 || b.pressed); }

  function _currentScreen(){
    const pw = document.getElementById('pw-screen');
    if(pw && pw.style.display !== 'none' && !pw.classList.contains('hidden')) return 'pw';
    if(document.getElementById('stage-screen')?.classList.contains('visible')) return 'stage';
    if(document.getElementById('game-screen')?.classList.contains('visible')) return 'game';
    if(document.getElementById('clear-screen')?.classList.contains('visible')) return 'clear';
    return 'none';
  }

  // ---- パスワード画面 ----
  function _pwUpdateCursor(){
    document.querySelectorAll('.pw-key').forEach((k,i) => {
      k.classList.toggle('gp-focus', i === _pwCursor);
    });
  }
  function _pwAction(){
    const val = PW_KEYS[_pwCursor];
    if(val === null) return; // emptyセル
    if(val === 'del') pwDelete();
    else pwInput(val);
  }

  // ---- ステージ選択画面 ----
  function _stageUpdateCursor(){
    const cells = document.querySelectorAll('.stage-cell');
    const stageCount = cells.length;
    cells.forEach((c,i) => {
      c.classList.toggle('gp-focus', i === _stageCursor);
    });
    // ミニゲーム広場ボタン（最後の項目）
    const plazaBtn = document.getElementById('stage-plaza-btn');
    if(plazaBtn){
      plazaBtn.classList.toggle('gp-focus', _stageCursor === stageCount);
    }
  }
  function _stageAction(){
    const cells = document.querySelectorAll('.stage-cell');
    const cell = cells[_stageCursor];
    if(!cell) return;
    // cleared クラスがあれば（unlock済み）即実行
    if(cell.classList.contains('cleared')){
      startFromStage(_stageCursor);
    }
  }

  // ---- ゲーム画面 ----
  function _gcUpdateCursor(){
    document.querySelectorAll('.cell').forEach((c,i) => {
      const r = +c.dataset.r, col = +c.dataset.c;
      c.classList.toggle('gp-focus', r === _gcRow && col === _gcCol);
    });
  }
  function _gcTap(){
    // 現在カーソル位置のセルをクリック
    const cells = document.querySelectorAll('.cell');
    cells.forEach(c => {
      if(+c.dataset.r === _gcRow && +c.dataset.c === _gcCol) c.click();
    });
  }
  function _gcInit(){
    // 有効なセルの初期位置（黒の上下左右で最初に有効なもの）
    const cells = document.querySelectorAll('.cell');
    for(const c of cells){
      if(c.classList.contains('valid')){
        _gcRow = +c.dataset.r; _gcCol = +c.dataset.c; break;
      }
    }
    _gcActive = true;
    _gcUpdateCursor();
  }

  function pollKankaku(){
    const gps = navigator.getGamepads ? navigator.getGamepads() : [];
    for(const gp of gps){
      if(!gp) continue;
      if(!_gp.connected){ _gp.connected = true; _pwUpdateCursor(); }
      const idx = gp.index;
      const p = _gp.prev;

      const bA  = _btnOn(gp.buttons[1]); // 決定
      const bB  = _btnOn(gp.buttons[0]); // 戻る/削除
      const up  = _btnOn(gp.buttons[12]) || (gp.axes[1] < -0.3);
      const dn  = _btnOn(gp.buttons[13]) || (gp.axes[1] >  0.3);
      const lt  = _btnOn(gp.buttons[14]) || (gp.axes[0] < -0.3);
      const rt  = _btnOn(gp.buttons[15]) || (gp.axes[0] >  0.3);

      const scr = _currentScreen();

      if(scr === 'pw'){
        // 上下左右でテンキーカーソル移動（3列グリッド）
        // PW_KEYS=[1,2,3,4,5,6,7,8,9,0,'del',null]
        // nullはスキップ、範囲外は移動しない
        if(up && !p[idx+'u']){
          let nc = _pwCursor - 3;
          while(nc >= 0 && PW_KEYS[nc] === null) nc -= 3;
          if(nc >= 0){ _pwCursor = nc; _pwUpdateCursor(); }
        }
        if(dn && !p[idx+'d']){
          let nc = _pwCursor + 3;
          while(nc <= 11 && PW_KEYS[nc] === null) nc += 3;
          if(nc <= 11){ _pwCursor = nc; _pwUpdateCursor(); }
        }
        if(lt && !p[idx+'l']){
          let nc = _pwCursor - 1;
          while(nc >= 0 && PW_KEYS[nc] === null) nc--;
          if(nc >= 0 && Math.floor(nc/3) === Math.floor(_pwCursor/3)){ _pwCursor = nc; _pwUpdateCursor(); }
        }
        if(rt && !p[idx+'r']){
          let nc = _pwCursor + 1;
          while(nc <= 11 && PW_KEYS[nc] === null) nc++;
          if(nc <= 11 && Math.floor(nc/3) === Math.floor(_pwCursor/3)){ _pwCursor = nc; _pwUpdateCursor(); }
        }
        if(bA && !p[idx+'A']){ _pwAction(); }
        if(bB && !p[idx+'B']){ window.location.href = 'plaza.html'; }
      }

      if(scr === 'stage'){
        const cells = document.querySelectorAll('.stage-cell');
        const stageCount = cells.length;
        // stageCount = ステージ数、stageCount番目 = ミニゲーム広場ボタン
        const total = stageCount + 1;
        if(lt && !p[idx+'l']){ _stageCursor=Math.max(0,_stageCursor-1); _stageUpdateCursor(); }
        if(rt && !p[idx+'r']){ _stageCursor=Math.min(total-1,_stageCursor+1); _stageUpdateCursor(); }
        if(up && !p[idx+'u']){ _stageCursor=Math.max(0,_stageCursor-3); _stageUpdateCursor(); }
        if(dn && !p[idx+'d']){ _stageCursor=Math.min(total-1,_stageCursor+3); _stageUpdateCursor(); }
        if(bA && !p[idx+'A']){
          if(_stageCursor < stageCount) _stageAction();
          else window.location.href='plaza.html'; // ミニゲーム広場ボタン
        }
        if(bB && !p[idx+'B']){ window.location.href='plaza.html'; }
      }

      if(scr === 'game'){
        if(!_gcActive) _gcInit();
        const prevRow=_gcRow, prevCol=_gcCol;
        if(up && !p[idx+'u'] && _gcRow>0){ _gcRow--; }
        if(dn && !p[idx+'d'] && _gcRow<N-1){ _gcRow++; }
        if(lt && !p[idx+'l'] && _gcCol>0){ _gcCol--; }
        if(rt && !p[idx+'r'] && _gcCol<N-1){ _gcCol++; }
        if(_gcRow!==prevRow || _gcCol!==prevCol) _gcUpdateCursor();
        if(bA && !p[idx+'A']){ _gcTap(); }
        if(bB && !p[idx+'B']){
          // Bボタン=ステージ選択へ戻る
          _gcActive = false;
          document.querySelectorAll('.cell').forEach(c=>c.classList.remove('gp-focus'));
          showStageSelect();
        }
      }

      if(scr === 'clear'){
        if(bB && !p[idx+'B']){ window.location.href='plaza.html'; }
      }

      p[idx+'A']=bA; p[idx+'B']=bB;
      p[idx+'u']=up; p[idx+'d']=dn; p[idx+'l']=lt; p[idx+'r']=rt;
    }
  }

  setInterval(pollKankaku, 16);

  // ゲーム画面切り替え時のカーソル初期化はshowClear/startFromStage内で処理済み

  window.addEventListener('gamepadconnected', ()=>{ _gp.connected=true; _pwUpdateCursor(); });
  setInterval(()=>{
    const gs = navigator.getGamepads?.();
    if(gs && [...gs].some(g=>g) && !_gp.connected){ _gp.connected=true; _pwUpdateCursor(); }
  }, 500);

  function showClear(){
    // クリア済みを保存
    saveCleared(puzzleIdx);

    // クリア画面を表示
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('game-screen').classList.remove('visible');
    const cs = document.getElementById('clear-screen');
    cs.style.display = 'flex';
    cs.classList.add('visible');

    const isLast = puzzleIdx >= PUZZLES.length - 1;
    if(!isLast){
      // 次の問題が存在: 2秒後に自動で次へ
      setTimeout(() => {
        cs.style.display = 'none';
        cs.classList.remove('visible');
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('game-screen').classList.add('visible');
        loadPuzzle(puzzleIdx + 1);
      }, 2000);
    }
    // 最終問題の場合はそのままクリア画面に留まる
  }
</script>
