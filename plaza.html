<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>ミニゲーム広場</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #fff;
      color: #1a1a1a;
      font-family: 'Noto Serif JP', serif;
      min-height: 100dvh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 52px 20px 64px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header .label {
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 0.45em;
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: 0.2em;
    }

    .game-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .game-card {
      display: block;
      background: #fff;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      padding: 20px 44px 20px 20px;
      text-decoration: none;
      color: #1a1a1a;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .game-card:active {
      background: #f8f8f8;
      border-color: #ccc;
    }
    .game-card::after {
      content: '›';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #ccc;
    }

    .card-tag {
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.22em;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 12px;
      color: #666;
      letter-spacing: 0.04em;
      line-height: 1.9;
    }

    .badge {
      display: inline-block;
      font-size: 9px;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1px 7px;
      letter-spacing: 0.06em;
      vertical-align: middle;
    }

    .section-label {
      font-size: 10px;
      color: #ccc;
      letter-spacing: 0.25em;
      text-align: center;
      margin: 24px 0 12px;
    }

    .footer {
      text-align: center;
      margin-top: 44px;
      font-size: 11px;
      color: #bbb;
      line-height: 2.5;
    }
    .footer a {
      color: #999;
      text-decoration: none;
    }
    .footer a:active { color: #555; }
  </style>
</head>
<body>
<div class="app">

  <div class="page-header">
    <div class="label">MINI GAME</div>
    <h1>ミニゲーム広場</h1>
  </div>

  <div class="game-list">

    <a class="game-card" href="index.html">
      <div class="card-tag">MEMORY</div>
      <div class="card-title">丸場所記憶ゲーム</div>
      <div class="card-desc">丸の場所を記憶して答える<br>金・銀・赤のメダルを目指せ</div>
    </a>

    <a class="game-card" href="dungeon.html">
      <div class="card-tag">ACTION</div>
      <div class="card-title">飛べ飛</div>
      <div class="card-desc">漢字「飛」が「壁」の隙間をくぐる<br>100壁達成で無理ゲーモード解放</div>
    </a>

    <div class="section-label">— 新着 —</div>

    <a class="game-card" href="kankaku.html">
      <div class="card-tag">PUZZLE <span class="badge">メンテナンス中</span></div>
      <div class="card-title">感覚謎解き</div>
      <div class="card-desc">言葉のない謎解き<br>現在準備中です</div>
    </a>

  </div>

  <div class="footer">
    <a href="index.html">丸場所記憶ゲームへ戻る</a><br>
    <span style="font-size:9px;letter-spacing:0.05em;">v2026.03.29</span>
  </div>

</div>
</body>
</html>
