<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>称号一覧 | 丸場所記憶ゲーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border2:rgba(0,0,0,0.06);--text:#1a1a18;--text2:#6b6b65;--text3:#a8a8a2;--green:#1D9E75;--blue:#378ADD;--accent:#D85A30;--r:14px;--rs:8px;}
    @media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1e1b;--surface2:#28281f;--border2:rgba(255,255,255,0.06);--text:#f0efe9;--text2:#9a9a92;--text3:#5a5a54;}}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100dvh;}
    .app{max-width:420px;margin:0 auto;padding:16px 16px 48px;}
    .page-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border2);}
    .back-btn{font-size:20px;text-decoration:none;color:var(--text2);line-height:1;}
    .page-title{font-size:18px;font-weight:500;}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:14px 16px;text-align:center;}
    .stat-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--text);}
    .stat-label{font-size:11px;color:var(--text3);margin-top:3px;}
    .section-label{font-size:11px;color:var(--text3);letter-spacing:0.06em;margin:0 0 8px;padding:0 2px;}
    .card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
    .title-row-plain{padding:14px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:14px;}
    .title-row-plain:last-child{border-bottom:none;}
    .title-row-plain.locked{opacity:0.4;}
    .tr-icon-wrap{width:44px;height:44px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .title-row-plain.unlocked .tr-icon-wrap{background:linear-gradient(135deg,#fff9e6,#ffeaa0);}
    @media(prefers-color-scheme:dark){.title-row-plain.unlocked .tr-icon-wrap{background:linear-gradient(135deg,#3a3010,#564a10);}}
    .tr-body{flex:1;}
    .tr-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
    .tr-desc{font-size:12px;color:var(--text2);}
    .tr-date{font-size:10px;color:var(--green);margin-top:3px;}
    .tr-action{margin-top:8px;}
    .tr-action-btn{font-size:11px;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:var(--rs);padding:4px 10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background 0.1s;}
    .tr-action-btn:hover{background:rgba(216,90,48,0.07);}
    .tr-action-btn.done{color:var(--text3);border-color:var(--border2);cursor:default;pointer-events:none;}
    .empty-state{padding:32px 16px;text-align:center;font-size:13px;color:var(--text3);}
    footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border2);text-align:center;font-size:11px;color:var(--text3);}

    /* ===== エアライド演出オーバーレイ ===== */
    #airride-overlay{position:fixed;inset:0;z-index:9999;background:#09090700;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;transition:opacity 0.5s ease;}
    #airride-overlay.fade-out{opacity:0;pointer-events:none;}
    #airride-overlay.bg-in{background:#090907ee;}
    .ar-header{color:#e8e8d8;font-size:13px;font-weight:500;margin-bottom:16px;letter-spacing:0.1em;opacity:0;transition:opacity 0.5s;}
    .ar-header.show{opacity:1;}
    .ar-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(340px,88vw);max-height:72vh;overflow-y:auto;padding:2px;}
    .ar-cell{background:#111110;border:1px solid #252520;border-radius:12px;padding:16px 12px;text-align:center;position:relative;overflow:hidden;transition:border-color 0.3s;}
    .ar-cell.locked-cell{opacity:0.25;}
    .ar-flash{position:absolute;inset:0;border-radius:12px;opacity:0;pointer-events:none;background:radial-gradient(circle,rgba(255,230,80,0.75) 0%,rgba(255,180,0,0) 68%);}
    .ar-icon{font-size:28px;line-height:1;display:block;margin-bottom:7px;transition:filter 0.4s ease,transform 0.45s cubic-bezier(0.34,1.56,0.64,1);filter:brightness(0.12);}
    .ar-name{font-size:12px;font-weight:500;color:#1e1e18;transition:color 0.4s;margin-bottom:3px;}
    .ar-desc{font-size:10px;color:#1a1a14;transition:color 0.4s;line-height:1.5;}
    .ar-cell.done .ar-icon{filter:brightness(1);transform:scale(1.12);}
    .ar-cell.done .ar-name{color:#ddddc8;}
    .ar-cell.done .ar-desc{color:#888876;}
    .ar-cell.done{border-color:#3a3820;}
    .ar-ring{position:absolute;inset:-2px;border-radius:14px;opacity:0;pointer-events:none;border:2px solid transparent;}
    @keyframes flash-pop{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
    @keyframes ring-glow{0%{opacity:0;border-color:#ffe87a}30%{opacity:1;border-color:#ffcc00}70%{opacity:0.6;border-color:#ff9900}100%{opacity:0;border-color:transparent}}
    @keyframes bg-darken{from{background:#09090700}to{background:#090907ee}}
    .ar-skip{margin-top:18px;font-size:11px;color:#404038;cursor:pointer;user-select:none;transition:color 0.2s;}
    .ar-skip:hover,.ar-skip:active{color:#888876;}
    .ar-done-msg{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:#ffe87a;font-size:12px;font-weight:500;letter-spacing:0.08em;opacity:0;transition:opacity 0.5s;white-space:nowrap;}
    .ar-done-msg.show{opacity:1;}

    /* デバッグパネル */
    #debug-panel{display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.6);overflow-y:auto;}
    .debug-inner{background:var(--surface);margin:16px;border-radius:var(--r);overflow:hidden;}
    .debug-hd{background:#1a1a18;color:#f0efe9;padding:14px 16px;font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
    .debug-hd span{font-size:10px;color:#888;font-weight:400;margin-left:6px;}
    .debug-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer;padding:0 4px;}
    .debug-section{padding:12px 16px;border-bottom:1px solid var(--border2);}
    .debug-section:last-child{border-bottom:none;}
    .debug-section-title{font-size:11px;color:var(--text3);letter-spacing:0.06em;margin-bottom:8px;font-weight:500;}
    .debug-btn{display:block;width:100%;padding:9px 12px;margin-bottom:6px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface2);font-size:13px;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:left;transition:background 0.1s;}
    .debug-btn:last-child{margin-bottom:0;}
    .debug-btn:hover{background:var(--surface);}
    .debug-btn.danger{border-color:var(--accent);color:var(--accent);background:none;}
    .debug-btn.danger:hover{background:rgba(216,90,48,0.06);}
    .debug-btn.ok{border-color:var(--green);color:var(--green);background:none;}
    .debug-log{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:var(--surface2);border-radius:var(--rs);padding:10px 12px;max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:8px;line-height:1.7;}
    .debug-nick-row{display:flex;gap:6px;margin-bottom:6px;}
    .debug-nick-input{flex:1;font-size:13px;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'Noto Sans JP',sans-serif;}
    .debug-nick-input:focus{outline:none;border-color:var(--blue);}
    .debug-status{font-size:11px;min-height:16px;margin-top:4px;color:var(--green);}
  </style>
</head>
<body>

<!-- デバッグパネル -->
<div id="debug-panel">
  <div class="debug-inner">
    <div class="debug-hd">
      <div>デバッグモード<span>※ 開発者専用</span></div>
      <button class="debug-close" onclick="closeDebug()">✕</button>
    </div>

    <!-- Firebase スコア削除 -->
    <div class="debug-section">
      <div class="debug-section-title">FIREBASE — ランキングデータ削除</div>
      <div class="debug-nick-row">
        <input class="debug-nick-input" id="debug-nick" placeholder="ニックネームを入力（例：製作者）">
        <button class="debug-btn danger" style="width:auto;padding:8px 12px;margin:0;" onclick="debugDeleteFirebase()">削除</button>
      </div>
      <div class="debug-status" id="debug-fb-status"></div>
    </div>

    <!-- localStorage 個別リセット -->
    <div class="debug-section">
      <div class="debug-section-title">LOCALSTORAGE — 項目別リセット</div>
      <button class="debug-btn" onclick="debugReset('adgame_nick','adgame_nick_changed')">ニックネームをリセット</button>
      <button class="debug-btn" onclick="debugReset('adgame_titles')">称号をリセット</button>
      <button class="debug-btn" onclick="debugReset('adgame_disp','adgame_ad_locked','adgame_ad_row_hidden','adgame_sections_hidden','adgame_banner_hidden')">表示設定をリセット</button>
      <button class="debug-btn" onclick="debugReset('adgame_device_id')">端末IDをリセット（新規ユーザー扱いに）</button>
    </div>

    <!-- localStorage 完全リセット -->
    <div class="debug-section">
      <div class="debug-section-title">LOCALSTORAGE — 完全リセット</div>
      <button class="debug-btn danger" onclick="debugResetAll()">全データを消去してリロード</button>
    </div>

    <!-- 現在のデータ確認 -->
    <div class="debug-section">
      <div class="debug-section-title">現在の LOCALSTORAGE</div>
      <button class="debug-btn ok" onclick="debugShowStorage()">データを表示</button>
      <div class="debug-log" id="debug-log" style="display:none"></div>
    </div>

  </div>
</div>

<div id="airride-overlay" style="display:none;">
  <div class="ar-header" id="ar-header">称号一覧</div>
  <div class="ar-grid" id="ar-grid"></div>
  <div class="ar-skip" onclick="skipAirride()">タップしてスキップ</div>
  <div class="ar-done-msg" id="ar-done-msg">タップして続ける</div>
</div>

<div class="app" id="main-app">
  <div class="page-header">
    <a class="back-btn" href="index.html">←</a>
    <span class="page-title" id="page-title-tap" style="user-select:none;">称号一覧</span>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val" id="count-obtained">0</div><div class="stat-label">入手済み</div></div>
    <div class="stat-card"><div class="stat-val" id="count-total">0</div><div class="stat-label">全称号数</div></div>
  </div>
  <div class="section-label">入手済み</div>
  <div class="card" id="obtained-list"><div class="empty-state">まだ称号を入手していません</div></div>
  <div class="section-label">未入手</div>
  <div class="card" id="locked-list"><div class="empty-state">称号はまだ登録されていません</div></div>
  <footer>&copy; 2026 丸場所記憶ゲーム</footer>
</div>

<script>
  const TITLE_DEFS = [
    {
      id: 'ad_killer',
      icon: '🙏',
      name: 'それは勘弁してくれ……',
      desc: '広告を非表示にしようとした',
    },
  ];

  const AD_LOCKED_KEY   = 'adgame_ad_locked';
  const AD_ROW_HIDDEN_KEY = 'adgame_ad_row_hidden';

  function fmtDate(ts){
    if(!ts)return'';
    const d=new Date(ts);
    return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }
  function getMyTitles(){try{return JSON.parse(localStorage.getItem('adgame_titles')||'[]');}catch(e){return[];}}

  // 広告トグル行を非表示にする
  function hideAdRow() {
    localStorage.setItem(AD_ROW_HIDDEN_KEY, '1');
    const btn = document.getElementById('hide-ad-row-btn');
    if(btn){ btn.textContent='非表示にしました'; btn.classList.add('done'); }
  }}

  // ===== 通常一覧 =====
  function render(myIds, myMap){
    const obtained = TITLE_DEFS.filter(d=>myIds.has(d.id));
    const locked   = TITLE_DEFS.filter(d=>!myIds.has(d.id));
    document.getElementById('count-obtained').textContent = obtained.length;
    document.getElementById('count-total').textContent    = TITLE_DEFS.length;

    const obtainedEl = document.getElementById('obtained-list');
    if(obtained.length===0){
      obtainedEl.innerHTML='<div class="empty-state">まだ称号を入手していません</div>';
    } else {
      obtainedEl.innerHTML='';
      [...obtained].sort((a,b)=>(myMap[b.id]?.obtainedAt||0)-(myMap[a.id]?.obtainedAt||0)).forEach(def=>{
        const t=myMap[def.id];
        const row=document.createElement('div');
        row.className='title-row-plain unlocked';

        // ad_killer 専用の詳細アクション
        let extra='';
        if(def.id==='ad_killer'){
          const alreadyHidden = localStorage.getItem(AD_ROW_HIDDEN_KEY)==='1';
          extra='<div class="tr-action"><button id="hide-ad-row-btn" class="tr-action-btn'+(alreadyHidden?' done':'')+'" onclick="hideAdRow()">'+(alreadyHidden?'非表示にしました':'設定から広告トグルを非表示にする')+'</button></div>';
        }

        row.innerHTML='<div class="tr-icon-wrap">'+def.icon+'</div><div class="tr-body"><div class="tr-name">'+def.name+'</div><div class="tr-desc">'+def.desc+'</div><div class="tr-date">入手：'+fmtDate(t?.obtainedAt)+'</div>'+extra+'</div>';
        obtainedEl.appendChild(row);
      });
    }

    const lockedEl = document.getElementById('locked-list');
    if(locked.length===0){
      lockedEl.innerHTML='<div class="empty-state">'+(TITLE_DEFS.length===0?'称号はまだ登録されていません':'すべての称号を入手しました！')+'</div>';
    } else {
      lockedEl.innerHTML='';
      locked.forEach(def=>{
        const row=document.createElement('div');
        row.className='title-row-plain locked';
        row.innerHTML='<div class="tr-icon-wrap" style="font-size:14px;color:var(--text3);">?</div><div class="tr-body"><div class="tr-name">'+def.name+'</div><div class="tr-desc">'+def.desc+'</div></div>';
        lockedEl.appendChild(row);
      });
    }
  }

  // ===== エアライド演出 =====
  let arSkipped = false;

  function buildGrid(myIds){
    const grid = document.getElementById('ar-grid');
    grid.innerHTML='';
    if(TITLE_DEFS.length===0) return false;
    TITLE_DEFS.forEach(def=>{
      const ok = myIds.has(def.id);
      const cell = document.createElement('div');
      cell.className = 'ar-cell'+(ok?'':' locked-cell');
      cell.dataset.id = def.id;
      cell.innerHTML =
        '<div class="ar-ring"></div>'+
        '<div class="ar-flash"></div>'+
        '<span class="ar-icon">'+(ok?def.icon:'?')+'</span>'+
        '<div class="ar-name">'+(ok?def.name:'???')+'</div>'+
        '<div class="ar-desc">'+(ok?def.desc:'')+'</div>';
      grid.appendChild(cell);
    });
    return true;
  }

  function delay(ms){return new Promise(r=>setTimeout(r,ms));}

  async function runAirride(myIds){
    const overlay = document.getElementById('airride-overlay');
    const header  = document.getElementById('ar-header');
    const doneMsg = document.getElementById('ar-done-msg');

    if(!buildGrid(myIds)){ skipAirride(); return; }

    // 背景を暗くする
    overlay.style.animation='bg-darken 0.6s ease forwards';
    overlay.style.background='#090907ee';
    await delay(400);
    if(arSkipped) return;

    header.classList.add('show');
    await delay(300);

    const cells = [...document.querySelectorAll('.ar-cell:not(.locked-cell)')];
    for(let i=0;i<cells.length;i++){
      if(arSkipped) break;
      await delay(i===0?100:90);
      if(arSkipped) break;

      const cell = cells[i];
      const flash = cell.querySelector('.ar-flash');
      const ring  = cell.querySelector('.ar-ring');

      // フラッシュ
      flash.style.animation='flash-pop 0.5s ease-out forwards';
      ring.style.animation='ring-glow 0.6s ease-out forwards';

      cell.classList.add('done');
      cell.style.borderColor='#4a4428';

      await delay(600);
      flash.style.animation='';
      ring.style.animation='';
    }

    if(!arSkipped){
      await delay(500);
      doneMsg.classList.add('show');
      overlay.addEventListener('click', finishAirride, {once:true});
      overlay.addEventListener('touchend', finishAirride, {once:true});
    }
  }

  function skipAirride(){
    arSkipped=true;
    document.querySelectorAll('.ar-cell:not(.locked-cell)').forEach(c=>c.classList.add('done'));
    finishAirride();
  }

  function finishAirride(){
    const overlay=document.getElementById('airride-overlay');
    overlay.classList.add('fade-out');
    setTimeout(()=>{ overlay.style.display='none'; },500);
  }

  // ===== 初期化 =====
  (function init(){
    const myTitles = getMyTitles();
    const myIds    = new Set(myTitles.map(t=>t.id));
    const myMap    = {};
    myTitles.forEach(t=>myMap[t.id]=t);

    render(myIds, myMap);

    // 称号データがない or 未入手なら演出なしでそのまま表示
    if(TITLE_DEFS.length === 0 || myIds.size === 0) return;

    // 称号がある時だけオーバーレイを表示して演出
    const ov = document.getElementById('airride-overlay');
    ov.style.display = 'flex';
    runAirride(myIds);
  })();

  // ===== デバッグモード =====
  const DB_URL = 'https://ad-game-7b40a-default-rtdb.asia-southeast1.firebasedatabase.app';

  // タイトルを5回タップで開く
  let tapCount = 0, tapTimer = null;
  document.getElementById('page-title-tap').addEventListener('click', () => {
    tapCount++;
    clearTimeout(tapTimer);
    if(tapCount >= 5){
      tapCount = 0;
      openDebug();
    } else {
      tapTimer = setTimeout(() => tapCount = 0, 1500);
    }
  });

  function openDebug(){
    document.getElementById('debug-panel').style.display = 'block';
    document.getElementById('debug-fb-status').textContent = '';
    document.getElementById('debug-log').style.display = 'none';
    // 現在のニックネームをデフォルト入力
    const savedNick = localStorage.getItem('adgame_nick') || '';
    document.getElementById('debug-nick').value = savedNick;
  }

  function closeDebug(){
    document.getElementById('debug-panel').style.display = 'none';
  }

  // Firebase のスコアを指定ニックネームで削除
  async function debugDeleteFirebase(){
    const nick = document.getElementById('debug-nick').value.trim();
    const status = document.getElementById('debug-fb-status');
    if(!nick){ status.style.color='var(--accent)'; status.textContent='ニックネームを入力してください'; return; }
    status.style.color='var(--text3)'; status.textContent='削除中…';
    try {
      const key = encodeURIComponent(nick.replace(/[.#$[\]/]/g,'_'));
      const res = await fetch(DB_URL+'/rankings/'+key+'.json', { method:'DELETE' });
      if(res.ok){
        status.style.color='var(--green)';
        status.textContent = '「'+nick+'」のFirebaseスコアを削除しました';
      } else {
        status.style.color='var(--accent)'; status.textContent = '削除失敗（status: '+res.status+'）';
      }
    } catch(e) {
      status.style.color='var(--accent)'; status.textContent = 'エラー: '+e.message;
    }
  }

  // localStorageの指定キーを削除してリロード
  function debugReset(...keys){
    if(!confirm(keys.join(', ') + '\nを削除してリロードします。よろしいですか？')) return;
    keys.forEach(k => localStorage.removeItem(k));
    location.reload();
  }

  // localStorage を全消去してリロード
  function debugResetAll(){
    if(!confirm('全localStorageデータを消去してリロードします。\nニックネーム・称号・設定・端末IDがすべてリセットされます。\n\n※ Firebaseのスコアは残ります')) return;
    localStorage.clear();
    location.href = 'index.html';
  }

  // localStorage の内容を表示
  function debugShowStorage(){
    const log = document.getElementById('debug-log');
    const keys = ['adgame_nick','adgame_nick_changed','adgame_device_id','adgame_titles','adgame_disp','adgame_ad_locked','adgame_ad_row_hidden'];
    const lines = keys.map(k => {
      const v = localStorage.getItem(k);
      if(v === null) return k + ' : (未設定)';
      try { return k + ' :\n  ' + JSON.stringify(JSON.parse(v), null, 2); }
      catch { return k + ' : ' + v; }
    });
    log.textContent = lines.join('\n\n');
    log.style.display = 'block';
  }
</script>
</body>
</html>
