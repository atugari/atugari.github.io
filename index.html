<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="バナー広告を表示しながら遊ぶ記憶ゲーム！消えた丸の場所を3秒以内に当てよう。ランキングで世界と競え！">
  <title>広告ゲーム｜記憶力チャレンジ</title>
  <!-- AdSense審査通過後にコメントを外してIDを書き換える
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_ADSENSE_ID" crossorigin="anonymous"></script>
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border2:rgba(0,0,0,0.06);--text:#1a1a18;--text2:#6b6b65;--text3:#a8a8a2;--green:#1D9E75;--blue:#378ADD;--accent:#D85A30;--r:14px;--rs:8px;}
    @media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1e1b;--surface2:#28281f;--border2:rgba(255,255,255,0.06);--text:#f0efe9;--text2:#9a9a92;--text3:#5a5a54;}}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;min-height:100dvh;}
    .app{max-width:420px;margin:0 auto;padding:16px 16px 48px;}
    .screen{display:none;} .screen.active{display:block;}
    .ad-label{font-size:10px;color:var(--text3);text-align:center;margin-bottom:4px;letter-spacing:0.05em;}
    .adsense-slot{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);min-height:70px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);margin-bottom:16px;}
    .nick-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:24px 20px;margin-bottom:16px;text-align:center;}
    .nick-card h1{font-size:20px;font-weight:500;margin-bottom:6px;}
    .nick-card p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.8;}
    .nick-input{width:100%;font-size:15px;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--surface);color:var(--text);margin-bottom:12px;text-align:center;font-family:'Noto Sans JP',sans-serif;}
    .nick-input:focus{outline:none;border-color:var(--blue);}
    .game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .stage-info{font-size:12px;color:var(--text2);}
    .stage-val{font-size:15px;font-weight:500;color:var(--text);}
    .score-wrap{display:flex;gap:12px;}
    .score-item{font-size:12px;color:var(--text2);text-align:right;}
    .score-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text);}
    .stage-progress{display:flex;gap:6px;margin-bottom:10px;justify-content:center;}
    .stage-dot{width:28px;height:6px;border-radius:3px;background:var(--surface2);border:1px solid var(--border2);}
    .stage-dot.done{background:var(--green);} .stage-dot.current{background:var(--blue);}
    .timer-wrap{height:6px;background:var(--surface2);border-radius:3px;margin-bottom:6px;overflow:hidden;}
    .timer-bar{height:100%;width:100%;border-radius:3px;background:var(--blue);transition:width 0.05s linear,background 0.3s;}
    .timer-bar.danger{background:var(--accent);}
    .timer-text{font-family:'DM Mono',monospace;text-align:center;font-size:12px;font-weight:500;margin-bottom:6px;min-height:18px;color:var(--text2);}
    .timer-text.danger{color:var(--accent);}
    .msg{text-align:center;font-size:13px;color:var(--text2);min-height:20px;margin-bottom:10px;}
    .msg.success{color:var(--green);} .msg.fail{color:var(--accent);} .msg.info{color:var(--blue);} .msg.watch{color:var(--accent);font-weight:500;}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
    .cell{aspect-ratio:1;border-radius:var(--rs);background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.1s;}
    .cell:hover{background:var(--surface);} .cell:active{transform:scale(0.95);}
    .cell.selected{background:var(--surface);border:2px solid var(--blue);}
    .cell.correct{border:2px solid var(--green) !important;background:rgba(29,158,117,0.08);}
    .cell.wrong{border:2px solid var(--accent) !important;background:rgba(216,90,48,0.08);}
    .cell.missed{border:2px dashed var(--accent) !important;}
    .grid.locked{pointer-events:none;opacity:0.65;} .grid.locked .cell{cursor:default;}
    .dot{width:50%;height:50%;border-radius:50%;pointer-events:none;opacity:0;}
    .dot.gold{background:radial-gradient(circle at 35% 35%,#FFE066,#D4A017);}
    .dot.silver{background:radial-gradient(circle at 35% 35%,#E8E8E8,#9A9A9A);}
    .dot.red{background:radial-gradient(circle at 35% 35%,#FF7070,#C0392B);}
    .sel-count{text-align:center;font-size:11px;color:var(--text3);margin-bottom:8px;min-height:16px;}
    .btn-row{display:flex;gap:8px;margin-bottom:12px;}
    button.btn{flex:1;padding:11px 0;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background 0.1s;}
    button.btn:hover{background:var(--surface);} button.btn:active{transform:scale(0.98);}
    button.btn:disabled{opacity:0.35;cursor:not-allowed;}
    button.btn.primary{background:var(--green);color:#fff;border-color:var(--green);}
    button.btn.primary:hover{background:#0F6E56;}
    .legend{display:flex;gap:12px;justify-content:center;margin-bottom:4px;}
    .leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);}
    .leg-dot{width:9px;height:9px;border-radius:50%;}
    .result-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:20px;margin-bottom:14px;text-align:center;}
    .result-card h2{font-size:17px;font-weight:500;margin-bottom:14px;}
    .stage-scores{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
    .ss-item{background:var(--surface2);border-radius:var(--rs);padding:10px 8px;text-align:center;}
    .ss-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
    .ss-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);}
    .total-label{font-size:12px;color:var(--text2);}
    .total-score{font-family:'DM Mono',monospace;font-size:30px;font-weight:500;color:var(--text);margin:6px 0 4px;}
    .ranking-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
    .ranking-header{padding:11px 16px;border-bottom:1px solid var(--border2);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
    .ranking-refresh{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'Noto Sans JP',sans-serif;}
    .ranking-row{padding:10px 16px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px;font-size:13px;}
    .ranking-row:last-child{border-bottom:none;}
    .rank-num{font-size:13px;font-weight:500;color:var(--text3);width:24px;flex-shrink:0;text-align:center;}
    .rank-num.gold{color:#D4A017;} .rank-num.silver{color:#888;} .rank-num.bronze{color:#CD7F32;}
    .rank-name{flex:1;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .rank-name.me{color:var(--blue);}
    .rank-score{font-family:'DM Mono',monospace;color:var(--text);flex-shrink:0;}
    .rank-empty,.rank-loading{padding:20px 16px;font-size:12px;color:var(--text3);text-align:center;}
    footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border2);text-align:center;font-size:11px;color:var(--text3);line-height:2.2;}
    footer a{color:var(--text3);text-decoration:underline;}
  </style>
</head>
<body>
<div class="app">
  <div class="ad-label">広 告</div>
  <div class="adsense-slot" id="ad-slot">
    <!-- AdSense審査通過後、このコメントをinsタグに置き換える
    <ins class="adsbygoogle" style="display:block"
         data-ad-client="ca-pub-YOUR_ADSENSE_ID"
         data-ad-slot="YOUR_AD_SLOT_ID"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    広告審査通過後にここに表示されます
  </div>

  <div class="screen active" id="screen-nick">
    <div class="nick-card">
      <h1>広告記憶ゲーム</h1>
      <p>Lv.5 → Lv.7 → Lv.10 の順に挑戦！<br>丸が全部消えたら<strong>3秒以内</strong>にタップして答えよう。<br>3ステージの合計スコアでランキングを競おう！</p>
      <input class="nick-input" id="nick-input" type="text" placeholder="ニックネームを入力" maxlength="12">
      <button class="btn primary" onclick="startChallenge()" style="width:100%">チャレンジ開始！</button>
    </div>
    <div class="ranking-card">
      <div class="ranking-header">ランキング<button class="ranking-refresh" onclick="loadRanking('rank-list-nick')">更新</button></div>
      <div id="rank-list-nick"><div class="rank-loading">読み込み中...</div></div>
    </div>
    <footer>
      <a href="privacy.html">プライバシーポリシー</a>　|　
      <a href="guide.html">使い方ガイド</a>　|　
      <a href="faq.html">よくある質問</a>　|　
      <a href="contact.html">お問い合わせ</a><br>
      &copy; 2026 広告ゲーム
    </footer>
  </div>

  <div class="screen" id="screen-game">
    <div class="game-header">
      <div class="stage-info">ステージ<br><span class="stage-val" id="stage-label">1/3</span></div>
      <div class="score-wrap">
        <div class="score-item">このステージ<br><span class="score-val" id="stage-score-disp">0</span></div>
        <div class="score-item">合計<br><span class="score-val" id="total-score-disp">0</span></div>
      </div>
    </div>
    <div class="stage-progress">
      <div class="stage-dot" id="sp0"></div>
      <div class="stage-dot" id="sp1"></div>
      <div class="stage-dot" id="sp2"></div>
    </div>
    <div class="timer-wrap" id="timer-wrap" style="display:none"><div class="timer-bar" id="timer-bar"></div></div>
    <div class="timer-text" id="timer-text"></div>
    <div class="msg" id="game-msg">スタートを押してください</div>
    <div class="grid" id="grid"></div>
    <div class="sel-count" id="sel-count"></div>
    <div class="btn-row">
      <button class="btn" id="start-btn" onclick="startStage()">スタート！</button>
      <button class="btn" id="answer-btn" onclick="submitAnswer()" disabled>答える</button>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#D4A017"></div>金 3,000pt</div>
      <div class="leg"><div class="leg-dot" style="background:#9A9A9A"></div>銀 2,000pt</div>
      <div class="leg"><div class="leg-dot" style="background:#C0392B"></div>赤 1,000pt</div>
    </div>
  </div>

  <div class="screen" id="screen-result">
    <div class="result-card">
      <h2>チャレンジ完了！</h2>
      <div class="stage-scores">
        <div class="ss-item"><div class="ss-label">Lv.5</div><div class="ss-val" id="rs0">0</div></div>
        <div class="ss-item"><div class="ss-label">Lv.7</div><div class="ss-val" id="rs1">0</div></div>
        <div class="ss-item"><div class="ss-label">Lv.10</div><div class="ss-val" id="rs2">0</div></div>
      </div>
      <div class="total-label">合計スコア</div>
      <div class="total-score" id="final-score">0</div>
    </div>
    <div class="ranking-card">
      <div class="ranking-header">ランキング<button class="ranking-refresh" onclick="loadRanking('rank-list-result')">更新</button></div>
      <div id="rank-list-result"><div class="rank-loading">読み込み中...</div></div>
    </div>
    <div class="btn-row">
      <button class="btn primary" onclick="goToNick()">もう一度挑戦！</button>
    </div>
  </div>
</div>

<script>
  // Realtime Database URL
  const DB_URL = 'https://ad-game-7b40a-default-rtdb.asia-southeast1.firebasedatabase.app';

  // ランキング保存
  async function saveScore(nickname, totalScore, stageScores) {
    try {
      const key = encodeURIComponent(nickname.trim().replace(/[.#$\[\]]/g, '_'));
      const url = `${DB_URL}/rankings/${key}.json`;
      // 既存スコアを取得
      const res = await fetch(url);
      const existing = await res.json();
      if (existing && existing.score >= totalScore) return; // 自己ベスト以下なら保存しない
      await fetch(url, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: nickname.trim(),
          score: totalScore,
          s0: stageScores[0],
          s1: stageScores[1],
          s2: stageScores[2],
          updatedAt: Date.now()
        })
      });
    } catch(e) {
      console.error('保存エラー:', e);
    }
  }

  // ランキング取得
  async function loadRanking(targetId) {
    const el = document.getElementById(targetId);
    el.innerHTML = '<div class="rank-loading">読み込み中...</div>';
    try {
      const res = await fetch(`${DB_URL}/rankings.json`);
      const data = await res.json();
      if (!data) {
        el.innerHTML = '<div class="rank-empty">まだ記録がありません</div>';
        return;
      }
      const entries = Object.values(data).sort((a, b) => b.score - a.score).slice(0, 10);
      if (entries.length === 0) {
        el.innerHTML = '<div class="rank-empty">まだ記録がありません</div>';
        return;
      }
      el.innerHTML = '';
      entries.forEach((entry, i) => {
        const row = document.createElement('div');
        row.className = 'ranking-row';
        const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
        const isMe = entry.name === nickname;
        row.innerHTML = `<span class="rank-num ${rc}">${medal}</span><span class="rank-name${isMe?' me':''}">${entry.name}${isMe?' ◀ あなた':''}</span><span class="rank-score">${entry.score.toLocaleString()}pt</span>`;
        el.appendChild(row);
      });
    } catch(e) {
      el.innerHTML = '<div class="rank-empty">読み込みに失敗しました</div>';
      console.error('取得エラー:', e);
    }
  }

  const STAGE_LEVELS=[5,7,10];
  const LEVEL_CFG={
    5: {dots:5,  goldMs:400, silverMs:750,  redMs:1200, fadeIn:400},
    7: {dots:7,  goldMs:280, silverMs:560,  redMs:900,  fadeIn:320},
    10:{dots:10, goldMs:130, silverMs:270,  redMs:460,  fadeIn:190},
  };
  const POINTS={gold:3000,silver:2000,red:1000};
  const TIME_LIMIT=3000, TICK=50;

  let nickname='',stageIdx=0,stageScores=[0,0,0],totalScore=0;
  let phase='idle',correctCells=[],selectedCells=[],dotMap={};
  let timerInterval=null;

  function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
  function setMsg(t,c=''){const el=document.getElementById('game-msg');el.textContent=t;el.className='msg'+(c?' '+c:'');}
  function getCfg(){return LEVEL_CFG[STAGE_LEVELS[stageIdx]];}
  function randomTypes(n){const p=['gold','silver','red'];return Array.from({length:n},()=>p[Math.floor(Math.random()*p.length)]);}

  function startChallenge(){
    const val=document.getElementById('nick-input').value.trim();
    if(!val){alert('ニックネームを入力してください');return;}
    nickname=val;stageIdx=0;stageScores=[0,0,0];totalScore=0;
    updateProgress();showScreen('screen-game');
    document.getElementById('total-score-disp').textContent='0';
    document.getElementById('stage-score-disp').textContent='0';
    document.getElementById('stage-label').textContent=`1/3 (Lv.${STAGE_LEVELS[0]})`;
    document.getElementById('start-btn').textContent='スタート！';
    document.getElementById('start-btn').disabled=false;
    document.getElementById('answer-btn').disabled=true;
    document.getElementById('timer-wrap').style.display='none';
    document.getElementById('timer-text').textContent='';
    setMsg('スタートを押してください');
    buildGrid();
  }

  function updateProgress(){
    for(let i=0;i<3;i++){
      const el=document.getElementById('sp'+i);
      el.className='stage-dot'+(i<stageIdx?' done':i===stageIdx?' current':'');
    }
  }

  function buildGrid(){
    const g=document.getElementById('grid');g.innerHTML='';
    for(let i=0;i<16;i++){
      const c=document.createElement('div');c.className='cell';c.dataset.idx=i;c.onclick=()=>onCellClick(i);
      const d=document.createElement('div');d.className='dot';d.id='dot-'+i;
      c.appendChild(d);g.appendChild(c);
    }
  }
  function getCell(i){return document.querySelector(`.cell[data-idx="${i}"]`);}
  function getDot(i){return document.getElementById('dot-'+i);}
  function updateSelCount(){
    const el=document.getElementById('sel-count');
    if(phase!=='answering'){el.textContent='';return;}
    el.textContent=`選択中: ${selectedCells.length} / ${getCfg().dots} 個`;
  }

  function startTimer(){
    let timeLeft=TIME_LIMIT;
    const bar=document.getElementById('timer-bar');
    const txt=document.getElementById('timer-text');
    document.getElementById('timer-wrap').style.display='block';
    bar.style.transition='none';bar.style.width='100%';
    bar.className='timer-bar';txt.className='timer-text';
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
      timeLeft-=TICK;
      const pct=Math.max(0,timeLeft/TIME_LIMIT*100);
      bar.style.transition='width 0.05s linear';bar.style.width=pct+'%';
      txt.textContent=`残り ${(timeLeft/1000).toFixed(1)} 秒`;
      if(pct<=33){bar.className='timer-bar danger';txt.className='timer-text danger';}
      if(timeLeft<=0){clearInterval(timerInterval);phase='timeout';setMsg('時間切れ！','fail');submitAnswer(true);}
    },TICK);
  }
  function stopTimer(){
    clearInterval(timerInterval);
    document.getElementById('timer-wrap').style.display='none';
    document.getElementById('timer-text').textContent='';
  }

  function startStage(){
    phase='showing';selectedCells=[];dotMap={};
    document.getElementById('start-btn').disabled=true;
    document.getElementById('answer-btn').disabled=true;
    document.getElementById('sel-count').textContent='';
    document.getElementById('stage-score-disp').textContent='0';
    stopTimer();
    setMsg('👁 よく見て覚えよう！タップはまだダメ！','watch');
    buildGrid();
    document.getElementById('grid').classList.add('locked');

    const cfg=getCfg(),FADE=cfg.fadeIn;
    const positions=shuffle([...Array(16).keys()]).slice(0,cfg.dots);
    correctCells=[...positions];
    const types=randomTypes(cfg.dots);
    positions.forEach((pos,i)=>{dotMap[pos]=types[i];});

    const maxDelay=700;let lastFinish=0;
    positions.forEach(pos=>{
      const color=dotMap[pos];
      const dur={gold:cfg.goldMs,silver:cfg.silverMs,red:cfg.redMs}[color];
      const delay=Math.floor(Math.random()*maxDelay);
      const finishAt=delay+FADE+dur+FADE;
      if(finishAt>lastFinish)lastFinish=finishAt;
      setTimeout(()=>{
        const dot=getDot(pos);dot.className='dot '+color;
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          dot.style.transition=`opacity ${FADE}ms ease-in-out`;dot.style.opacity='1';
        }));
        setTimeout(()=>{dot.style.transition=`opacity ${FADE}ms ease-in-out`;dot.style.opacity='0';},FADE+dur);
      },delay);
    });
    setTimeout(()=>{
      document.getElementById('grid').classList.remove('locked');
      enterAnswerPhase();
    },lastFinish+150);
  }

  function enterAnswerPhase(){
    phase='answering';
    setMsg(`⚡ 今すぐ！${getCfg().dots}個を3秒以内にタップ！`,'info');
    document.getElementById('answer-btn').disabled=false;
    updateSelCount();startTimer();
  }

  function onCellClick(idx){
    if(phase!=='answering')return;
    const cfg=getCfg(),cell=getCell(idx);
    if(selectedCells.includes(idx)){
      selectedCells=selectedCells.filter(i=>i!==idx);cell.classList.remove('selected');
    } else {
      if(selectedCells.length>=cfg.dots){
        setMsg(`選べるのは${cfg.dots}個まで！`,'fail');
        setTimeout(()=>setMsg(`⚡ 今すぐ！${cfg.dots}個を3秒以内にタップ！`,'info'),800);
        return;
      }
      selectedCells.push(idx);cell.classList.add('selected');
    }
    updateSelCount();
  }

  function submitAnswer(isTimeout=false){
    if(phase!=='answering'&&phase!=='timeout')return;
    phase='result';stopTimer();
    document.getElementById('answer-btn').disabled=true;
    document.getElementById('sel-count').textContent='';

    let stageGain=0;
    correctCells.forEach(idx=>{
      const cell=getCell(idx),dot=getDot(idx);
      dot.className='dot '+dotMap[idx];dot.style.transition='opacity 0.25s';dot.style.opacity='0.3';
      if(selectedCells.includes(idx)){cell.classList.remove('selected');cell.classList.add('correct');stageGain+=POINTS[dotMap[idx]];}
      else{cell.classList.add('missed');}
    });
    selectedCells.forEach(idx=>{
      if(!correctCells.includes(idx)){getCell(idx).classList.remove('selected');getCell(idx).classList.add('wrong');stageGain=Math.max(0,stageGain-500);}
    });

    stageScores[stageIdx]=stageGain;
    totalScore=stageScores.reduce((a,b)=>a+b,0);
    document.getElementById('stage-score-disp').textContent=stageGain.toLocaleString();
    document.getElementById('total-score-disp').textContent=totalScore.toLocaleString();

    const correct=selectedCells.filter(i=>correctCells.includes(i)).length;
    const wrong=selectedCells.filter(i=>!correctCells.includes(i)).length;
    const cfg=getCfg();

    if(isTimeout&&correct===0){setMsg('時間切れ！0点…','fail');}
    else if(correct===cfg.dots&&wrong===0){setMsg(`完璧！ +${stageGain.toLocaleString()}点`,'success');}
    else{setMsg(`${correct}/${cfg.dots}個正解。+${stageGain.toLocaleString()}点`,stageGain>0?'':'fail');}

    setTimeout(()=>{
      stageIdx++;
      if(stageIdx<3){
        updateProgress();
        document.getElementById('stage-label').textContent=`${stageIdx+1}/3 (Lv.${STAGE_LEVELS[stageIdx]})`;
        document.getElementById('start-btn').textContent=`次のステージへ (Lv.${STAGE_LEVELS[stageIdx]})`;
        document.getElementById('start-btn').disabled=false;
        setMsg(`次はLv.${STAGE_LEVELS[stageIdx]}！準備ができたらスタート`,'info');
        buildGrid();
      } else {finishChallenge();}
    },1800);
  }

  async function finishChallenge(){
    document.getElementById('rs0').textContent=stageScores[0].toLocaleString();
    document.getElementById('rs1').textContent=stageScores[1].toLocaleString();
    document.getElementById('rs2').textContent=stageScores[2].toLocaleString();
    document.getElementById('final-score').textContent=totalScore.toLocaleString();
    showScreen('screen-result');
    await saveScore(nickname, totalScore, stageScores);
    loadRanking('rank-list-result');
  }

  function goToNick(){
    showScreen('screen-nick');
    loadRanking('rank-list-nick');
  }

  // 初期ロード
  loadRanking('rank-list-nick');
</script>
</body>
</html>
